<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>📢 BBC Sentiment Insights</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      max-width: 960px;
      background-color: #f4f7fa;
    }
    h1 {
      font-size: 36px;
      color: #333;
      text-align: center;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
      font-size: 14px;
    }
    th {
      background-color: #007acc;
      color: white;
    }
    tr.positive {
      background-color: #d4edda;
    }
    tr.negative {
      background-color: #f8d7da;
    }
    tr.neutral {
      background-color: #fff3cd;
    }
    .section-header {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #333;
    }
    .section {
      margin-top: 40px;
    }
    .preview-row {
  background-color: #eef6ff;
  transition: all 0.3s ease;
}
.preview-content {
  font-size: 14px;
  padding: 8px;
}
.btn-preview {
  font-size: 12px;
  padding: 4px 8px;
  background-color: #007acc;
  color: white;
  border: none;
  border-radius: 4px;
  margin-top: 5px;
  cursor: pointer;
}
.btn-preview:hover {
  background-color: #005c8c;
}


  </style>
</head>
<body>
  <h1>📢 BBC Sentiment Insights</h1>

  <div class="section">
    <div class="section-header">Top 10 Positive Titles from BBC RSS</div>
    <table id="cnnTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Title</th>
          <th>Score</th>
          <th>Emotion</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="cnnTableBody"></tbody>
    </table>
  </div>

  <script>
    
  function togglePreview(index) {
    const previewRow = document.querySelector(`#preview-row-${index}`);
    if (!previewRow) return;

    const isVisible = previewRow.classList.contains("visible");
    previewRow.classList.toggle("visible", !isVisible);
    previewRow.style.display = isVisible ? "none" : "table-row";
  }

    async function fetchCNNData() {
      const tableBody = document.getElementById("cnnTableBody");
      tableBody.innerHTML = '<tr><td colspan="5">🔄 Loading BBC data...</td></tr>';

      try {
        const response = await fetch('https://subgrade.onrender.com/bbc/rss'); // 👈 Live Render API
        const data = await response.json();
        tableBody.innerHTML = '';

        data.forEach((item, i) => {
  const row = document.createElement("tr");
  row.classList.add(item.emotion.toLowerCase());

  row.innerHTML = `
    <td>${i + 1}</td>
    <td>
      <a href="${item.link}" target="_blank">${item.title}</a><br/>
      <button class="btn-preview" onclick="togglePreview(${i})">🔍 Preview</button>
    </td>
    <td>${item.sentimentScore.toFixed(2)}</td>
    <td>${item.emotion}</td>
    <td>${new Date(item.pubDate).toLocaleDateString()}</td>
  `;

  const previewRow = document.createElement("tr");
  previewRow.id = `preview-row-${i}`;
  previewRow.style.display = "none";
  previewRow.classList.add("preview-row");
  previewRow.innerHTML = `
    <td colspan="5">
      <div class="preview-content">
        <strong>Summary:</strong><br/>
        ${item.description || 'No summary available.'}
      </div>
    </td>
  `;

  tableBody.appendChild(row);
  tableBody.appendChild(previewRow);
});

      } catch (e) {
        console.error("Error fetching BBC RSS:", e);
        tableBody.innerHTML = '<tr><td colspan="5">❌ Unable to load BBC RSS feed.</td></tr>';
      }
    }

window.addEventListener("DOMContentLoaded", function () {
  document.getElementById("applyButton").addEventListener("click", applyDateRange);
  fetchBBCData(); // call backend API
});


    
    
  </script>
</body>
</html>
